<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SolarLearn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-panel" style="max-width: 500px;">
            <div class="eclipse-graphic" style="width: 80px; height: 80px; margin-bottom: 20px;"></div>
            <h2>Welcome Back, Explorer</h2>
            
            <form action="home.html">
                <div style="text-align: left; width: 90%; margin: 0 auto;">
                    <label style="font-size: 0.9rem; color: #bbb;">Email</label>
                    <input type="email" placeholder="e.g. astronaut@gmail.com" required>
                </div>

                <div style="text-align: left; width: 90%; margin: 0 auto;">
                    <label style="font-size: 0.9rem; color: #bbb;">Password</label>
                    <input type="password" placeholder="********" required>
                </div>

                <button type="submit" style="width: 90%; margin-top: 20px;">Login</button>
            </form>
            
            <br>
            <p style="font-size: 0.9rem;">
                Don't have an account? <a href="registration.html" style="color: var(--eclipse-gold); text-decoration: underline;">Register here</a>
            </p>
            <br>
            <a href="index.html" style="font-size: 0.8rem; color: #777;">&larr; Back to Landing Page</a>
        </div>
    </div>
</body>
</html>
