<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - SolarLearn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-panel" style="max-width: 500px;">
            <h2>Course Registration</h2>
            <p>Join the "Solar System & Eclipse" Masterclass</p>
            
            <form action="home.html">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Create Password" required>
                
                <select>
                    <option>Beginner: The Solar System</option>
                    <option>Advanced: Eclipses & Mechanics</option>
                </select>

                <button type="submit">Complete Registration</button>
            </form>
            <br>
            <a href="index.html" style="font-size: 0.9rem; color: #aaa;">Back to Landing Page</a>
        </div>
    </div>
</body>
</html>
